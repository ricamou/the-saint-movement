<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>$SAINT</title>
  <meta name="description" content="Choose your language to enter The SAINT Movement official website." />
  <meta name="theme-color" content="#061827" />

  <meta property="og:title" content="$SAINT" />
  <meta property="og:description" content="The SAINT Movement — A Crypto Community With a Soul." />
  <meta property="og:image" content="https://www.saintfamily.org/assets/logo/saint-logo.jpg" />
  <meta property="og:url" content="https://www.saintfamily.org/" />
  <meta property="og:type" content="website" />

  <link rel="icon" href="favicon.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="language-gate-body">
  <div class="ambient-bg" aria-hidden="true">
    <div class="mesh mesh-a"></div>
    <div class="mesh mesh-b"></div>
    <div class="mesh mesh-c"></div>
    <div class="stars"></div>
    <div class="noise"></div>
  </div>

  <main class="language-gate">
    <div class="language-gate-card">
      <div class="hero-logo-frame gate-logo">
        <div class="hero-halo"></div>
        <img src="assets/logo/saint-logo.jpg" alt="SAINT logo" />
      </div>

      <p class="eyebrow">The SAINT Movement</p>
      <h1>$SAINT</h1>
      <p class="language-gate-subtitle">Choose your language to continue.</p>

      <div class="language-choice-grid">
        <button onclick="chooseLanguage('en')">
          <strong>English</strong>
          <span>Continue in English</span>
        </button>

        <button onclick="chooseLanguage('pt')">
          <strong>Português</strong>
          <span>Continuar em Português</span>
        </button>

        <button onclick="chooseLanguage('es')">
          <strong>Español</strong>
          <span>Continuar en Español</span>
        </button>

        <button onclick="chooseLanguage('zh')">
          <strong>中文</strong>
          <span>继续使用中文</span>
        </button>
      </div>

      <a class="language-skip" href="home.html" onclick="localStorage.setItem('saint-lang','en')">
        Continue in English →
      </a>
    </div>
  </main>

  <script>
    function chooseLanguage(lang) {
      localStorage.setItem("saint-lang", lang);
      window.location.href = "home.html";
    }
  </script>
</body>
</html>
